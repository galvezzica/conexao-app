<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Conexão</title>
<meta name="description" content="Sua vida escolar e espiritual no mesmo lugar.">
<meta name="theme-color" content="#1e3a8a">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
  input:focus { outline: none; }
</style>
</head>
<body class="bg-slate-50 min-h-screen">

<div id="app"></div>

<script>
  const SUPABASE_URL = 'https://nnoybujcgpkmosqlxcjn.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ub3lidWpjZ3BrbW9zcWx4Y2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzgwMzcsImV4cCI6MjA5MjcxNDAzN30.CYThoLKyG7rk2b-oKg7pEAIJ3r677PNo0tQJB8R7SF8';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const app = document.getElementById('app');
  let mode = 'login';

  async function checkAuth() {
    const { data: { user } } = await sb.auth.getUser();
    if (user) renderApp(user);
    else renderAuth();
  }

  function renderAuth() {
    app.innerHTML = `
      <div class="min-h-screen flex items-center justify-center px-5 py-10">
        <div class="w-full max-w-md">
          <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-800 to-indigo-900 rounded-2xl mb-4 text-white text-2xl font-bold shadow-lg shadow-blue-900/20">
              C
            </div>
            <div class="text-2xl font-bold text-slate-900 mb-1">Conexão</div>
            <div class="text-sm text-slate-500">Sua vida escolar e espiritual no mesmo lugar</div>
          </div>

          <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
            <div class="flex gap-1 mb-6 bg-slate-100 p-1 rounded-xl">
              <button onclick="setMode('login')" class="flex-1 py-2 rounded-lg font-semibold text-sm transition ${mode === 'login' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}">
                Entrar
              </button>
              <button onclick="setMode('signup')" class="flex-1 py-2 rounded-lg font-semibold text-sm transition ${mode === 'signup' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}">
                Criar conta
              </button>
            </div>

            <form onsubmit="handleAuth(event)" class="space-y-4">
              <div>
                <label class="block text-xs font-semibold text-slate-700 mb-1.5">Email</label>
                <input type="email" id="email" required autocomplete="email"
                  class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700 focus:border-blue-700">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-700 mb-1.5">Senha</label>
                <input type="password" id="password" required minlength="6"
                  autocomplete="${mode === 'login' ? 'current-password' : 'new-password'}"
                  class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700 focus:border-blue-700">
                <div class="text-xs text-slate-400 mt-1.5">Mínimo 6 caracteres</div>
              </div>

              <button type="submit" id="submitBtn"
                class="w-full bg-blue-900 hover:bg-blue-800 active:bg-blue-950 text-white font-semibold py-3 rounded-xl transition shadow-sm">
                ${mode === 'login' ? 'Entrar' : 'Criar minha conta'}
              </button>

              <div id="message" class="text-sm text-center hidden px-3 py-2.5 rounded-xl"></div>
            </form>
          </div>

          <div class="text-center text-xs text-slate-400 mt-6">
            Versão de teste · v0.1
          </div>
        </div>
      </div>
    `;
  }

  function renderApp(user) {
    const initial = (user.email || 'U')[0].toUpperCase();
    app.innerHTML = `
      <div class="min-h-screen px-5 py-8">
        <div class="max-w-md mx-auto">

          <div class="flex items-center justify-between mb-6">
            <div>
              <div class="text-xs text-slate-500 font-medium">Bem-vindo,</div>
              <div class="text-lg font-bold text-slate-900">${user.email}</div>
            </div>
            <div class="w-11 h-11 bg-gradient-to-br from-blue-700 to-blue-900 rounded-full flex items-center justify-center text-white font-bold shadow-md shadow-blue-900/20">
              ${initial}
            </div>
          </div>

          <div class="bg-gradient-to-br from-blue-800 to-indigo-900 rounded-2xl p-6 text-white mb-4 relative overflow-hidden">
            <div class="absolute -top-4 -right-2 text-9xl opacity-5 font-thin">✧</div>
            <div class="text-xs uppercase tracking-widest opacity-70 font-semibold mb-2">✦ Versículo do dia</div>
            <div class="text-base leading-relaxed font-medium mb-3">
              "Porque sou eu que conheço os planos que tenho para vocês, planos de fazê-los prosperar e dar a vocês esperança e um futuro."
            </div>
            <div class="text-sm font-semibold opacity-85">Jeremias 29:11</div>
          </div>

          <div class="bg-white rounded-2xl p-5 border border-slate-100 mb-4">
            <div class="text-sm font-bold text-slate-900 mb-1">🎉 Cadastro funcionando</div>
            <div class="text-sm text-slate-500 leading-relaxed">
              Você está dentro do Conexão. Em breve aqui vão aparecer suas notas, tarefas e hábitos.
            </div>
          </div>

          <button onclick="logout()" class="w-full bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 font-semibold py-3 rounded-xl transition">
            Sair
          </button>

          <div class="text-center text-xs text-slate-400 mt-6">
            Versão de teste · v0.1
          </div>
        </div>
      </div>
    `;
  }

  function setMode(newMode) {
    mode = newMode;
    renderAuth();
  }

  function showMessage(text, type) {
    const msg = document.getElementById('message');
    msg.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700', 'bg-slate-50', 'text-slate-600');
    if (type === 'error') msg.classList.add('bg-red-50', 'text-red-700');
    else if (type === 'success') msg.classList.add('bg-green-50', 'text-green-700');
    else msg.classList.add('bg-slate-50', 'text-slate-600');
    msg.textContent = text;
  }

  function translateError(message) {
    const map = {
      'Invalid login credentials': 'Email ou senha incorretos.',
      'User already registered': 'Esse email já tem conta. Tenta entrar.',
      'Email not confirmed': 'Você precisa confirmar seu email antes de entrar. Olha sua caixa de entrada.',
      'Password should be at least 6 characters': 'A senha precisa ter no mínimo 6 caracteres.',
    };
    return map[message] || message;
  }

  async function handleAuth(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.classList.add('opacity-60');
    showMessage('Aguarde...', 'info');

    if (mode === 'signup') {
      const { error } = await sb.auth.signUp({ email, password });
      if (error) {
        showMessage(translateError(error.message), 'error');
      } else {
        showMessage('Conta criada. Confira seu email pra confirmar e depois volta aqui pra entrar.', 'success');
      }
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        showMessage(translateError(error.message), 'error');
      } else {
        renderApp(data.user);
        return;
      }
    }
    btn.disabled = false;
    btn.classList.remove('opacity-60');
  }

  async function logout() {
    await sb.auth.signOut();
    renderAuth();
  }

  checkAuth();
</script>

</body>
</html>
