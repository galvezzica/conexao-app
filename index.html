<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

</head>
<body class="bg-slate-50 min-h-screen">

<div id="app"></div>
<div id="modal" class="hidden"></div>

<script>
const SUPABASE_URL = 'https://nnoybujcgpkmosqlxcjn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ub3lidWpjZ3BrbW9zcWx4Y2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzgwMzcsImV4cCI6MjA5MjcxNDAzN30.CYThoLKyG7rk2b-oKg7pEAIJ3r677PNo0tQJB8R7SF8';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const app = document.getElementById('app');
const modalEl = document.getElementById('modal');

let mode = 'login';
let currentUser = null;
let subjects = [];
let expandedId = null;

const EMOJIS = ['📐','📖','🔬','✝️','🌎','🏛️','🇬🇧','🎨','🎵','🏃','💻','📚'];

async function checkAuth() {
  const { data: { user } } = await sb.auth.getUser();
  if (user) { currentUser = user; await loadAndRender(); }
  else renderAuth();
}

async function loadAndRender() {
  const { data, error } = await sb.from('subjects').select('*, grades(*)').order('created_at');
  if (error) { console.error(error); subjects = []; }
  else subjects = data || [];
  renderApp();
}

function renderAuth() {
  app.innerHTML = `
    <div class="min-h-screen flex items-center justify-center px-5 py-10">
      <div class="w-full max-w-md">
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-800 to-indigo-900 rounded-2xl mb-4 text-white text-2xl font-bold shadow-lg shadow-blue-900/20">C</div>
          <div class="text-2xl font-bold text-slate-900 mb-1">Conexão</div>
          <div class="text-sm text-slate-500">Sua vida escolar e espiritual no mesmo lugar</div>
        </div>
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
          <div class="flex gap-1 mb-6 bg-slate-100 p-1 rounded-xl">
            <button onclick="setMode('login')" class="flex-1 py-2 rounded-lg font-semibold text-sm transition ${mode === 'login' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}">Entrar</button>
            <button onclick="setMode('signup')" class="flex-1 py-2 rounded-lg font-semibold text-sm transition ${mode === 'signup' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500'}">Criar conta</button>
          </div>
          <form onsubmit="handleAuth(event)" class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-slate-700 mb-1.5">Email</label>
              <input type="email" id="email" required autocomplete="email" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700 focus:border-blue-700">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-700 mb-1.5">Senha</label>
              <input type="password" id="password" required minlength="6" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700 focus:border-blue-700">
              <div class="text-xs text-slate-400 mt-1.5">Mínimo 6 caracteres</div>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-semibold py-3 rounded-xl transition shadow-sm">${mode === 'login' ? 'Entrar' : 'Criar minha conta'}</button>
            <div id="message" class="text-sm text-center hidden px-3 py-2.5 rounded-xl"></div>
          </form>
        </div>
        <div class="text-center text-xs text-slate-400 mt-6">Versão de teste · v0.2</div>
      </div>
    </div>
  `;
}

function calcMean(grades) {
  const valid = (grades || []).filter(g => g.score !== null && g.score !== undefined);
  if (valid.length === 0) return null;
  const total = valid.reduce((s, g) => s + Number(g.score) * Number(g.weight), 0);
  const w = valid.reduce((s, g) => s + Number(g.weight), 0);
  return w > 0 ? total / w : null;
}

function calcNeeded(grades, target = 7) {
  const valid = (grades || []).filter(g => g.score !== null && g.score !== undefined);
  const pending = (grades || []).filter(g => g.score === null || g.score === undefined);
  if (pending.length === 0) return null;
  const currentSum = valid.reduce((s, g) => s + Number(g.score) * Number(g.weight), 0);
  const validW = valid.reduce((s, g) => s + Number(g.weight), 0);
  const pendW = pending.reduce((s, g) => s + Number(g.weight), 0);
  if (pendW === 0) return null;
  return (target * (validW + pendW) - currentSum) / pendW;
}

function meanColor(mean) {
  if (mean === null) return { text: 'text-slate-400', bg: 'bg-slate-100', label: 'Sem notas' };
  if (mean >= 7) return { text: 'text-green-600', bg: 'bg-green-50', label: 'Tranquilo' };
  if (mean >= 5) return { text: 'text-amber-600', bg: 'bg-amber-50', label: 'Atenção' };
  return { text: 'text-red-600', bg: 'bg-red-50', label: 'Crítico' };
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toFixed(1).replace('.', ',');
}

function renderApp() {
  const initial = (currentUser.email || 'U')[0].toUpperCase();
  const totalGrades = subjects.reduce((s, sub) => s + (sub.grades || []).filter(g => g.score !== null).length, 0);
  const subjectsWithMean = subjects.map(s => ({ ...s, mean: calcMean(s.grades) })).filter(s => s.mean !== null);
  const overallMean = subjectsWithMean.length > 0
    ? subjectsWithMean.reduce((s, sub) => s + sub.mean, 0) / subjectsWithMean.length
    : null;

  app.innerHTML = `
    <div class="min-h-screen pb-20">
      <div class="max-w-md mx-auto px-5 pt-8">

        <div class="flex items-center justify-between mb-6">
          <div>
            <div class="text-xs text-slate-500 font-medium">Olá,</div>
            <div class="text-base font-bold text-slate-900 truncate max-w-[220px]">${currentUser.email}</div>
          </div>
          <div class="flex gap-2 items-center">
            <div class="w-11 h-11 bg-gradient-to-br from-blue-700 to-blue-900 rounded-full flex items-center justify-center text-white font-bold shadow-md shadow-blue-900/20">${initial}</div>
          </div>
        </div>

        <div class="bg-gradient-to-br from-blue-800 to-indigo-900 rounded-2xl p-5 text-white mb-6 relative overflow-hidden">
          <div class="absolute -top-4 -right-2 text-9xl opacity-5 font-thin">✧</div>
          <div class="text-xs uppercase tracking-widest opacity-70 font-semibold mb-2">✦ Versículo do dia</div>
          <div class="text-sm leading-relaxed font-medium mb-2">"Porque sou eu que conheço os planos que tenho para vocês, planos de fazê-los prosperar e dar a vocês esperança e um futuro."</div>
          <div class="text-xs font-semibold opacity-85">Jeremias 29:11</div>
        </div>

        <div class="bg-gradient-to-br from-indigo-900 to-purple-900 rounded-2xl p-5 text-white mb-6 relative overflow-hidden">
          <div class="absolute -top-2 right-2 text-8xl opacity-10">📊</div>
          <div class="text-xs uppercase tracking-widest opacity-70 font-semibold mb-2">Média geral</div>
          <div class="text-4xl font-extrabold mb-1">${fmt(overallMean)}</div>
          <div class="text-xs opacity-80">${subjectsWithMean.length} matéria(s) com nota · ${totalGrades} avaliação(ões) lançada(s)</div>
        </div>

        <div class="flex items-center justify-between mb-3">
          <div class="text-base font-bold text-slate-900">Minhas notas</div>
          <button onclick="openSubjectModal()" class="text-xs font-semibold text-blue-700 hover:text-blue-900">+ Matéria</button>
        </div>

        <div class="space-y-2 mb-4">
          ${subjects.length === 0 ? `
            <div class="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center">
              <div class="text-4xl mb-3">📚</div>
              <div class="text-sm font-semibold text-slate-900 mb-1">Sem matérias ainda</div>
              <div class="text-xs text-slate-500 mb-4">Adiciona suas matérias do bimestre pra começar a controlar suas notas.</div>
              <button onclick="openSubjectModal()" class="bg-blue-900 hover:bg-blue-800 text-white text-sm font-semibold px-5 py-2.5 rounded-xl">+ Adicionar primeira matéria</button>
            </div>
          ` : subjects.map(s => renderSubjectCard(s)).join('')}
        </div>

        <button onclick="logout()" class="w-full bg-white hover:bg-slate-50 border border-slate-200 text-slate-600 font-semibold py-2.5 rounded-xl transition text-sm mt-6">Sair</button>

        <div class="text-center text-xs text-slate-400 mt-6">Versão de teste · v0.2</div>
      </div>
    </div>
  `;
}

function renderSubjectCard(s) {
  const mean = calcMean(s.grades);
  const color = meanColor(mean);
  const expanded = expandedId === s.id;
  const grades = (s.grades || []).slice().sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  const needed = calcNeeded(s.grades, 7);
  const pendingCount = (s.grades || []).filter(g => g.score === null || g.score === undefined).length;

  return `
    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">
      <div onclick="toggleSubject('${s.id}')" class="p-4 flex items-center gap-3 cursor-pointer">
        <div class="w-11 h-11 rounded-xl ${color.bg} flex items-center justify-center text-xl flex-shrink-0">${s.emoji || '📚'}</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-bold text-slate-900 truncate">${s.name}</div>
          <div class="text-xs ${color.text} font-semibold">${color.label}${grades.length > 0 ? ' · ' + grades.length + ' avaliação(ões)' : ''}</div>
        </div>
        <div class="text-2xl font-extrabold ${color.text} px-3 py-1 ${color.bg} rounded-lg min-w-[58px] text-center">${fmt(mean)}</div>
        <div class="text-slate-400 transition ${expanded ? 'rotate-180' : ''}">▾</div>
      </div>

      ${expanded ? `
        <div class="border-t border-slate-100 p-4 bg-slate-50">
          ${grades.length === 0 ? `
            <div class="text-center py-3 text-xs text-slate-500">Nenhuma avaliação cadastrada ainda.</div>
          ` : `
            <div class="space-y-2 mb-3">
              ${grades.map(g => `
                <div class="flex items-center gap-3 bg-white rounded-xl p-3">
                  <div class="flex-1 min-w-0">
                    <div class="text-sm font-semibold text-slate-900 truncate">${g.evaluation_name}</div>
                    <div class="text-xs text-slate-400">Peso ${g.weight}${g.evaluation_date ? ' · ' + new Date(g.evaluation_date).toLocaleDateString('pt-BR') : ''}</div>
                  </div>
                  <div class="text-base font-extrabold ${g.score === null || g.score === undefined ? 'text-slate-300 italic text-xs font-medium' : 'text-slate-900'}">${g.score === null || g.score === undefined ? 'a fazer' : fmt(g.score)}</div>
                  <button onclick="event.stopPropagation(); deleteGrade('${g.id}')" class="text-slate-300 hover:text-red-500 text-lg leading-none w-7 h-7">×</button>
                </div>
              `).join('')}
            </div>
          `}

          ${pendingCount > 0 && needed !== null ? `
            <div class="rounded-xl p-3 mb-3 ${needed > 10 ? 'bg-red-50 text-red-700' : needed <= 0 ? 'bg-green-50 text-green-700' : 'bg-amber-50 text-amber-800'} text-xs font-medium leading-relaxed">
              ${needed > 10 ? '⚠️ Mesmo tirando 10 nas pendentes, não dá pra fechar com média 7. Foca em recuperação.' :
                needed <= 0 ? '✅ Mesmo zerando as pendentes, você passa com média 7.' :
                `🎯 Pra fechar com média 7, você precisa tirar pelo menos <strong>${fmt(needed)}</strong> ${pendingCount > 1 ? 'em média nas pendentes' : 'na pendente'}.`}
            </div>
          ` : ''}

          <div class="flex gap-2">
            <button onclick="openGradeModal('${s.id}')" class="flex-1 bg-blue-900 hover:bg-blue-800 text-white text-sm font-semibold py-2.5 rounded-xl">+ Adicionar nota</button>
            <button onclick="deleteSubject('${s.id}', '${s.name.replace(/'/g, '')}')" class="bg-white border border-slate-200 text-slate-500 hover:text-red-600 text-sm font-semibold px-4 rounded-xl">Apagar</button>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function toggleSubject(id) {
  expandedId = expandedId === id ? null : id;
  renderApp();
}

function openSubjectModal() {
  modalEl.classList.remove('hidden');
  modalEl.innerHTML = `
    <div class="fixed inset-0 modal-bg flex items-end sm:items-center justify-center z-50" onclick="if(event.target===this)closeModal()">
      <div class="bg-white w-full max-w-md sm:rounded-2xl rounded-t-2xl p-6 shadow-2xl">
        <div class="text-base font-bold text-slate-900 mb-4">Nova matéria</div>
        <form onsubmit="handleAddSubject(event)" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-700 mb-1.5">Nome</label>
            <input type="text" id="subjectName" required maxlength="40" placeholder="Ex: Matemática" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-700 mb-1.5">Ícone</label>
            <div class="grid grid-cols-6 gap-2" id="emojiPicker">
              ${EMOJIS.map((e, i) => `<button type="button" data-emoji="${e}" onclick="pickEmoji('${e}')" class="aspect-square text-2xl rounded-xl border ${i === 0 ? 'border-blue-700 bg-blue-50' : 'border-slate-200'}">${e}</button>`).join('')}
            </div>
            <input type="hidden" id="subjectEmoji" value="${EMOJIS[0]}">
          </div>
          <div class="flex gap-2 pt-2">
            <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-700 font-semibold py-2.5 rounded-xl text-sm">Cancelar</button>
            <button type="submit" class="flex-1 bg-blue-900 text-white font-semibold py-2.5 rounded-xl text-sm">Adicionar</button>
          </div>
        </form>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById('subjectName')?.focus(), 100);
}

function pickEmoji(e) {
  document.getElementById('subjectEmoji').value = e;
  document.querySelectorAll('#emojiPicker button').forEach(b => {
    if (b.dataset.emoji === e) b.className = 'aspect-square text-2xl rounded-xl border border-blue-700 bg-blue-50';
    else b.className = 'aspect-square text-2xl rounded-xl border border-slate-200';
  });
}

async function handleAddSubject(e) {
  e.preventDefault();
  const name = document.getElementById('subjectName').value.trim();
  const emoji = document.getElementById('subjectEmoji').value;
  const { error } = await sb.from('subjects').insert({ name, emoji });
  if (error) { alert('Erro: ' + error.message); return; }
  closeModal();
  await loadAndRender();
}

function openGradeModal(subjectId) {
  modalEl.classList.remove('hidden');
  modalEl.innerHTML = `
    <div class="fixed inset-0 modal-bg flex items-end sm:items-center justify-center z-50" onclick="if(event.target===this)closeModal()">
      <div class="bg-white w-full max-w-md sm:rounded-2xl rounded-t-2xl p-6 shadow-2xl">
        <div class="text-base font-bold text-slate-900 mb-4">Nova avaliação</div>
        <form onsubmit="handleAddGrade(event, '${subjectId}')" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-700 mb-1.5">Nome da avaliação</label>
            <input type="text" id="gradeName" required maxlength="40" placeholder="Ex: Prova 1, Trabalho..." class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-semibold text-slate-700 mb-1.5">Peso</label>
              <input type="number" id="gradeWeight" required min="1" max="10" step="1" value="1" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-700 mb-1.5">Nota (opcional)</label>
              <input type="number" id="gradeScore" min="0" max="10" step="0.1" placeholder="Ex: 8,5" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700">
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-700 mb-1.5">Data (opcional)</label>
            <input type="date" id="gradeDate" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700">
          </div>
          <div class="text-xs text-slate-400">Deixa a nota em branco se ainda não fez a prova. Você adiciona depois.</div>
          <div class="flex gap-2 pt-2">
            <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-700 font-semibold py-2.5 rounded-xl text-sm">Cancelar</button>
            <button type="submit" class="flex-1 bg-blue-900 text-white font-semibold py-2.5 rounded-xl text-sm">Adicionar</button>
          </div>
        </form>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById('gradeName')?.focus(), 100);
}

async function handleAddGrade(e, subjectId) {
  e.preventDefault();
  const evaluation_name = document.getElementById('gradeName').value.trim();
  const weight = Number(document.getElementById('gradeWeight').value);
  const scoreVal = document.getElementById('gradeScore').value;
  const score = scoreVal === '' ? null : Number(scoreVal);
  const dateVal = document.getElementById('gradeDate').value;
  const evaluation_date = dateVal === '' ? null : dateVal;

  const { error } = await sb.from('grades').insert({
    subject_id: subjectId, evaluation_name, weight, score, evaluation_date
  });
  if (error) { alert('Erro: ' + error.message); return; }
  closeModal();
  await loadAndRender();
}

async function deleteSubject(id, name) {
  if (!confirm(`Apagar "${name}" e todas as notas dessa matéria?`)) return;
  const { error } = await sb.from('subjects').delete().eq('id', id);
  if (error) { alert('Erro: ' + error.message); return; }
  if (expandedId === id) expandedId = null;
  await loadAndRender();
}

async function deleteGrade(id) {
  if (!confirm('Apagar essa avaliação?')) return;
  const { error } = await sb.from('grades').delete().eq('id', id);
  if (error) { alert('Erro: ' + error.message); return; }
  await loadAndRender();
}

function closeModal() {
  modalEl.classList.add('hidden');
  modalEl.innerHTML = '';
}

function setMode(newMode) { mode = newMode; renderAuth(); }

function showMessage(text, type) {
  const msg = document.getElementById('message');
  msg.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700', 'bg-slate-50', 'text-slate-600');
  if (type === 'error') msg.classList.add('bg-red-50', 'text-red-700');
  else if (type === 'success') msg.classList.add('bg-green-50', 'text-green-700');
  else msg.classList.add('bg-slate-50', 'text-slate-600');
  msg.textContent = text;
}

function translateError(message) {
  const map = {
    'Invalid login credentials': 'Email ou senha incorretos.',
    'User already registered': 'Esse email já tem conta. Tenta entrar.',
    'Email not confirmed': 'Você precisa confirmar seu email antes de entrar.',
    'Password should be at least 6 characters': 'A senha precisa ter no mínimo 6 caracteres.',
  };
  return map[message] || message;
}

async function handleAuth(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.classList.add('opacity-60');
  showMessage('Aguarde...', 'info');

  if (mode === 'signup') {
    const { error } = await sb.auth.signUp({ email, password });
    if (error) showMessage(translateError(error.message), 'error');
    else showMessage('Conta criada. Agora clica em Entrar.', 'success');
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) showMessage(translateError(error.message), 'error');
    else { currentUser = data.user; await loadAndRender(); return; }
  }
  btn.disabled = false; btn.classList.remove('opacity-60');
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null; subjects = []; expandedId = null;
  renderAuth();
}

checkAuth();
</script>

</body>
</html>
