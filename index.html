function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const base64 = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}
async function subscribePush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return null;
  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC),
      });
    }
    const json = sub.toJSON();
    await sb.from('push_subscriptions').upsert({
      endpoint: json.endpoint,
      p256dh: json.keys.p256dh,
      auth: json.keys.auth,
      user_agent: navigator.userAgent.slice(0, 200),
    }, { onConflict: 'user_id,endpoint' });
    return sub;
  } catch (e) {
    console.error('Push subscribe falhou:', e);
    return null;
  }
}
async function askNotifPerm() {
  if (!('Notification' in window)) { toast('Esse navegador não suporta notificações.', 'error'); return; }
  if (Notification.permission === 'denied') { toast('Você bloqueou notificações. Libera nas configurações do navegador.', 'error'); return; }
  if (Notification.permission !== 'granted') {
    const r = await Notification.requestPermission();
    if (r !== 'granted') { toast('Permissão negada.', 'error'); return; }
  }
  toast('Notificações ativadas!', 'success');
  const sub = await subscribePush();
  if (sub) {
    new Notification('Conexão', { body: 'Pronto. Vamos te avisar de tarefas e lembretes diariamente.', icon: '/icon-192.svg' });
  } else {
    new Notification('Conexão', { body: 'Notificações locais ativadas.', icon: '/icon-192.svg' });
  }
}

function notifyOverdue() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const last = localStorage.getItem('last_notif');
  const today = new Date().toISOString().slice(0, 10);
  if (last === today) return; // só uma vez por dia
  const overdue = tasks.filter(t => !t.completed && t.due_date && new Date(t.due_date) < new Date());
  const today_tasks = tasks.filter(t => !t.completed && t.due_date && dayDiff(t.due_date) === 0);
  if (overdue.length === 0 && today_tasks.length === 0) return;
  let body = '';
  if (overdue.length) body += overdue.length + ' tarefa(s) atrasada(s). ';
  if (today_tasks.length) body += today_tasks.length + ' pra hoje.';
  new Notification('Conexão', { body: body.trim(), icon: '/icon-192.svg', tag: 'overdue' });
  localStorage.setItem('last_notif', today);
}

function calcMean(grades, period) {
  let g = grades || [];
  if (period) g = g.filter(x => (x.period || 1) === period);
  const v = g.filter(x => x.score !== null && x.score !== undefined);
  if (!v.length) return null;
  const t = v.reduce((s, x) => s + Number(x.score) * Number(x.weight), 0);
  const w = v.reduce((s, x) => s + Number(x.weight), 0);
  return w > 0 ? t / w : null;
}
function calcNeeded(grades, period, target = 7) {
  let g = grades || [];
  if (period) g = g.filter(x => (x.period || 1) === period);
  const v = g.filter(x => x.score !== null && x.score !== undefined);
  const p = g.filter(x => x.score === null || x.score === undefined);
  if (!p.length) return null;
  const cs = v.reduce((s, x) => s + Number(x.score) * Number(x.weight), 0);
  const vw = v.reduce((s, x) => s + Number(x.weight), 0);
  const pw = p.reduce((s, x) => s + Number(x.weight), 0);
  return pw > 0 ? (target * (vw + pw) - cs) / pw : null;
}

function relTime(iso) {
  const d = new Date(iso), n = new Date();
  const x = Math.floor((n - d) / 1000);
  if (x < 60) return 'agora';
  if (x < 3600) return 'há ' + Math.floor(x/60) + ' min';
  if (x < 86400) return 'há ' + Math.floor(x/3600) + ' h';
  if (x < 172800) return 'ontem';
  if (x < 604800) return Math.floor(x/86400) + ' dias atrás';
  return d.toLocaleDateString('pt-BR');
}

async function compressImage(file, maxSize = 256) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = () => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } }
        else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        canvas.toBlob(b => b ? resolve(b) : reject('Falha'), 'image/jpeg', 0.85);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function getStats() {
  const today = new Date().toISOString().slice(0, 10);
  const todayKeys = new Set(allHabits.filter(h => h.completed_date === today).map(h => h.habit_key));
  const totalPoints = allHabits.reduce((s, h) => s + (h.points || 0), 0);
  const wa = new Date(); wa.setDate(wa.getDate() - 7);
  const ws = wa.toISOString().slice(0, 10);
  const weekPoints = allHabits.filter(h => h.completed_date >= ws).reduce((s, h) => s + (h.points || 0), 0);
  const dates = [...new Set(allHabits.map(h => h.completed_date))].sort().reverse();
  let streak = 0;
  if (dates.length) {
    const tdy = new Date().toISOString().slice(0,10);
    let cur = dates[0] === tdy ? 0 : (dates[0] === new Date(Date.now()-86400000).toISOString().slice(0,10) ? -1 : null);
    if (cur !== null) {
      let exp = new Date(); exp.setHours(0,0,0,0); exp.setDate(exp.getDate() + cur);
      for (const d of dates) {
        if (d === exp.toISOString().slice(0,10)) { streak++; exp.setDate(exp.getDate() - 1); }
        else break;
      }
    }
  }
  const bibleCount = allHabits.filter(h => h.habit_key === 'bible').length;
  const lateTasks = tasks.filter(t => !t.completed && t.due_date && new Date(t.due_date) < new Date()).length;
  const pendingTasks = tasks.filter(t => !t.completed).length;
  const tasksDone = tasks.filter(t => t.completed).length;
  const ms = subjects.map(s => calcMean(s.grades, currentBim)).filter(m => m !== null);
  const overallMean = ms.length ? ms.reduce((a,b)=>a+b,0)/ms.length : null;
  // Hábitos da semana atual
  const weekStart = new Date(); weekStart.setHours(0,0,0,0); weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const monthStart = new Date(); monthStart.setHours(0,0,0,0); monthStart.setDate(1);
  const wsStr = weekStart.toISOString().slice(0,10);
  const msStr = monthStart.toISOString().slice(0,10);
  const habitsMonth = allHabits.filter(h => h.completed_date >= msStr).length;
  const bibleWeek = allHabits.filter(h => h.completed_date >= wsStr && h.habit_key === 'bible').length;
  const tasksWeek = tasks.filter(t => t.completed && t.completed_at && t.completed_at >= weekStart.toISOString()).length;
  const activeDays = new Set(allHabits.map(h => h.completed_date)).size;
  return { todayKeys, totalPoints, weekPoints, streak, bibleCount, lateTasks, pendingTasks, totalCompletions: allHabits.length, tasksDone, overallMean, habitsMonth, bibleWeek, tasksWeek, activeDays, badgesCount: badges.length };
}

function challengeProgress(c, stats) {
  const m = c.metric;
  if (m === 'streak') return Math.min(stats.streak, c.target);
  if (m === 'tasks_week') return Math.min(stats.tasksWeek, c.target);
  if (m === 'bible_week') return Math.min(stats.bibleWeek, c.target);
  if (m === 'habits_month') return Math.min(stats.habitsMonth, c.target);
  if (m === 'badges_count') return Math.min(stats.badgesCount, c.target);
  return 0;
}

  if (overall >= 7 && fail.length === 1) return 'Você tá bem! Só ' + fail[0].name + ' precisa de atenção.';

  return 'Foco e oração. Você consegue subir essa média.';

function renderTasks() {
  const pending = tasks.filter(t => !t.completed);
  const done = tasks.filter(t => t.completed);
  const g = { atr: [], hoje: [], sem: [], dep: [], np: [] };
  pending.forEach(t => {
    const d = dayDiff(t.due_date);
    if (d === null) g.np.push(t);
    else if (d < 0) g.atr.push(t);

    return '<div class="rounded-xl p-3 mb-3 bg-amber-50 text-amber-800 text-xs font-medium leading-relaxed">🎯 Pra fechar com média 7, você precisa tirar pelo menos <strong>'+fmt(need)+'</strong> '+(pc>1?'em média nas pendentes':'na próxima')+'.</div>';

  return '';
}

async function toggleHabit(key, points, done) {
  const today = new Date().toISOString().slice(0, 10);
  if (done) await sb.from('habit_completions').delete().eq('habit_key', key).eq('completed_date', today);
  else {
    const { error } = await sb.from('habit_completions').insert({ habit_key: key, completed_date: today });
    if (error && error.code !== '23505') toast('Erro: ' + error.message, 'error');
    else if (!error) toast('+' + points + ' pontos!', 'success');
  }
  await loadAndRender();
}

function renderFriends() {
  let html = '<div class="flex items-center justify-between mb-4"><button onclick="setTab(\'profile\')" class="text-sm text-slate-500">← Voltar</button><div class="text-xl font-bold text-slate-900">Amigos</div><div></div></div>';

  const accepted = friendships.filter(f => f.status === 'accepted');

  if (friendsTab === 'pending') {
    if (!pending.length) html += '<div class="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center"><div class="text-4xl mb-3">📨</div><div class="text-sm font-semibold text-slate-900">Nenhum pedido pendente</div></div>';
    else {
      const ids = pending.map(p => p.requester_id);

      }).join('') + '</div>';
    }

    if (!accepted.length) html += '<div class="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center"><div class="text-4xl mb-3">👥</div><div class="text-sm font-semibold text-slate-900 mb-1">Sem amigos ainda</div><div class="text-xs text-slate-500">Vai na aba Descobrir pra encontrar colegas.</div></div>';
    else {
      html += '<div class="space-y-2">' + accepted.map(f => {
        const otherId = f.requester_id === currentUser.id ? f.addressee_id : f.requester_id;
        const prof = schoolMates.find(p => p.user_id === otherId);
        return prof ? profileCard(prof, f) : '';
      }).join('') + '</div>';
    }
  } else {

    else {
      const myGrade = (profile.grade_level || '').toLowerCase().trim();
      const myClass = (profile.class_letter || '').toLowerCase().trim();
      const sorted = discover.slice().sort((a, b) => {
        const aClass = myClass && (a.class_letter || '').toLowerCase().trim() === myClass ? 2 : 0;
        const bClass = myClass && (b.class_letter || '').toLowerCase().trim() === myClass ? 2 : 0;
        const aGrade = myGrade && (a.grade_level || '').toLowerCase().trim() === myGrade ? 1 : 0;
        const bGrade = myGrade && (b.grade_level || '').toLowerCase().trim() === myGrade ? 1 : 0;
        return (bClass + bGrade) - (aClass + aGrade);
      });
      html += '<div class="text-xs text-slate-500 mb-2 px-1">'+discover.length+' adolescente(s) da sua escola</div><div class="space-y-2">' + sorted.map(p => profileCard(p, getFriendStatus(p.user_id))).join('') + '</div>';
    }
  }
  return html;
}

function renderFAQ() {

function openPrayerModal() {
  modalEl.classList.remove('hidden');
  modalEl.innerHTML = '<div class="fixed inset-0 modal-bg flex items-end sm:items-center justify-center z-50" onclick="if(event.target===this)closeModal()"><div class="bg-white w-full max-w-md sm:rounded-2xl rounded-t-2xl p-6 shadow-2xl anim-up"><div class="text-base font-bold text-slate-900 mb-4">Nova postagem</div><form onsubmit="handleAddPrayer(event)" class="space-y-4"><div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Tipo</label><div class="grid grid-cols-2 gap-2"><label class="flex items-center justify-center gap-2 p-3 border-2 border-blue-700 bg-blue-50 rounded-xl cursor-pointer text-sm font-semibold text-blue-900"><input type="radio" name="ptype" value="request" checked class="hidden">🙏 Pedido</label><label class="flex items-center justify-center gap-2 p-3 border-2 border-slate-200 rounded-xl cursor-pointer text-sm font-semibold text-slate-700 has-[:checked]:border-emerald-700 has-[:checked]:bg-emerald-50 has-[:checked]:text-emerald-900"><input type="radio" name="ptype" value="gratitude" class="hidden">🎉 Gratidão</label></div></div><div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Sua mensagem</label><textarea id="prayerContent" required minlength="3" maxlength="500" rows="4" placeholder="Conta o que tá no seu coração..." class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700 resize-none"></textarea></div><div class="grid grid-cols-2 gap-3"><div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Nome (opcional)</label><input type="text" id="prayerName" maxlength="30" value="'+escapeHtml(profile?.display_name||'')+'" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700"></div><div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Idade</label><input type="number" id="prayerAge" min="10" max="25" value="'+escapeHtml(profile?.age||'')+'" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700"></div></div><label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="prayerAnon" class="w-4 h-4"><span class="text-xs text-slate-700 font-medium">Postar como anônimo</span></label><div class="flex gap-2 pt-2"><button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-700 font-semibold py-2.5 rounded-xl text-sm">Cancelar</button><button type="submit" class="flex-1 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold py-2.5 rounded-2xl text-sm shadow-md shadow-indigo-500/30">Postar</button></div></form></div></div>';
  setTimeout(() => document.getElementById('prayerContent').focus(), 100);
}
async function handleAddPrayer(e) {
  e.preventDefault();
  const ptype = document.querySelector('input[name="ptype"]:checked').value;
  const content = document.getElementById('prayerContent').value.trim();
  const anonymous = document.getElementById('prayerAnon').checked;
  const dn = document.getElementById('prayerName').value.trim();
  const display_name = anonymous ? null : (dn || null);
  const av = document.getElementById('prayerAge').value;
  const age = av === '' ? null : Number(av);
  const { error } = await sb.from('prayers').insert({ content, anonymous, display_name, age, prayer_type: ptype, avatar_url: anonymous ? null : (profile?.avatar_url || null) });
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  closeModal(); await loadAndRender(); toast('Postagem enviada!', 'success');
}

async function toggleTask(id, c) {
  await sb.from('tasks').update({ completed: !c, completed_at: !c ? new Date().toISOString() : null }).eq('id', id);
  await loadAndRender();
}
async function deleteTask(id) {
  if (!confirm('Apagar essa tarefa?')) return;
  await sb.from('tasks').delete().eq('id', id);
  await loadAndRender();
}
async function deleteSubject(id, name) {
  if (!confirm('Apagar "'+name+'" e todas as notas?')) return;
  await sb.from('subjects').delete().eq('id', id);
  if (expandedId === id) expandedId = null;
  await loadAndRender();
}
async function deleteGrade(id) {
  if (!confirm('Apagar essa avaliação?')) return;
  await sb.from('grades').delete().eq('id', id);
  await loadAndRender();
}
function closeModal() { modalEl.classList.add('hidden'); modalEl.innerHTML = ''; }

function setMode(m) { mode = m; renderAuth(); }
function showMessage(text, type) {
  const msg = document.getElementById('message');
  msg.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700', 'bg-slate-50', 'text-slate-600');
  if (type === 'error') msg.classList.add('bg-red-50', 'text-red-700');
  else if (type === 'success') msg.classList.add('bg-green-50', 'text-green-700');
  else msg.classList.add('bg-slate-50', 'text-slate-600');
  msg.textContent = text;
}
function translateError(m) {
  const map = {
    'Invalid login credentials': 'Email ou senha incorretos.',
    'User already registered': 'Esse email já tem conta.',
    'Email not confirmed': 'Confirme seu email primeiro.',
    'Password should be at least 6 characters': 'Senha precisa ter no mínimo 6 caracteres.',
  };
  return map[m] || m;
}
async function handleAuth(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.classList.add('opacity-60');
  showMessage('Aguarde...', 'info');
  if (mode === 'signup') {
    const { error } = await sb.auth.signUp({ email, password });
    if (error) showMessage(translateError(error.message), 'error');
    else showMessage('Conta criada. Agora clica em Entrar.', 'success');
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) showMessage(translateError(error.message), 'error');
    else { currentUser = data.user; await loadAndRender(); return; }
  }
  btn.disabled = false; btn.classList.remove('opacity-60');
}
async function logout() {
  await sb.auth.signOut();
  currentUser = null; subjects = []; tasks = []; prayers = []; allHabits = []; profile = null; expandedId = null; currentTab = 'home';
  renderAuth();
}


function openForgotPassword() {
  modalEl.classList.remove('hidden');
  modalEl.innerHTML = '<div class="fixed inset-0 modal-bg flex items-end sm:items-center justify-center z-50" onclick="if(event.target===this)closeModal()"><div class="bg-white w-full max-w-md sm:rounded-2xl rounded-t-2xl p-6 shadow-2xl anim-up"><div class="text-base font-bold text-slate-900 mb-2">Esqueceu a senha?</div><div class="text-sm text-slate-500 mb-4">Vamos te mandar um link por email pra você redefinir.</div><form onsubmit="handleForgotPassword(event)" class="space-y-4"><div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Seu email</label><input type="email" id="fpEmail" required autocomplete="email" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700"></div><div class="flex gap-2 pt-2"><button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-700 font-semibold py-2.5 rounded-xl text-sm">Cancelar</button><button type="submit" class="flex-1 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold py-2.5 rounded-2xl text-sm shadow-md shadow-indigo-500/30">Enviar link</button></div></form></div></div>';
  setTimeout(() => document.getElementById('fpEmail').focus(), 100);
}
async function handleForgotPassword(e) {
  e.preventDefault();
  const email = document.getElementById('fpEmail').value.trim();
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/?reset=1' });
  if (error) toast('Erro: ' + error.message, 'error');
  else { closeModal(); toast('Olha seu email, link enviado!', 'success'); }
}
function renderResetPassword() {
  app.innerHTML = '<div class="min-h-screen flex items-center justify-center px-5 py-10"><div class="w-full max-w-md"><div class="text-center mb-8"><div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-800 to-indigo-900 rounded-2xl mb-4 text-white text-2xl font-bold shadow-lg">🔐</div><div class="text-2xl font-bold text-slate-900 mb-1">Nova senha</div><div class="text-sm text-slate-500">Define uma senha nova pra continuar</div></div><div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100"><form onsubmit="handleResetPassword(event)" class="space-y-4"><div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Nova senha</label><input type="password" id="newPass" required minlength="6" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700"><div class="text-xs text-slate-400 mt-1.5">Mínimo 6 caracteres</div></div><button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white font-semibold py-3 rounded-2xl shadow-lg shadow-indigo-500/30">Salvar nova senha</button><div id="rpMsg" class="text-sm text-center hidden px-3 py-2.5 rounded-xl"></div></form></div></div></div>';
}
async function handleResetPassword(e) {
  e.preventDefault();
  const password = document.getElementById('newPass').value;
  const { error } = await sb.auth.updateUser({ password });
  const msg = document.getElementById('rpMsg');
  msg.classList.remove('hidden');
  if (error) { msg.className = 'text-sm text-center bg-red-50 text-red-700 px-3 py-2.5 rounded-xl'; msg.textContent = 'Erro: ' + error.message; }
  else { msg.className = 'text-sm text-center bg-green-50 text-green-700 px-3 py-2.5 rounded-xl'; msg.textContent = 'Senha trocada! Redirecionando...'; setTimeout(() => { window.location.href = '/'; }, 1500); }
}

// Detecta link de reset
if (window.location.hash.includes('type=recovery') || window.location.search.includes('reset=1')) {
  sb.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') renderResetPassword();
  });
  setTimeout(() => { if (window.location.hash.includes('type=recovery')) renderResetPassword(); }, 500);
}
checkAuth();
</script>
</body>
