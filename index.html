// ============ HELPERS ============
function calcMean(grades) {
  const valid = (grades || []).filter(g => g.score !== null && g.score !== undefined);
  if (valid.length === 0) return null;
  const total = valid.reduce((s, g) => s + Number(g.score) * Number(g.weight), 0);
  const w = valid.reduce((s, g) => s + Number(g.weight), 0);
  return w > 0 ? total / w : null;
}

function calcNeeded(grades, target = 7) {
  const valid = (grades || []).filter(g => g.score !== null && g.score !== undefined);
  const pending = (grades || []).filter(g => g.score === null || g.score === undefined);
  if (pending.length === 0) return null;
  const currentSum = valid.reduce((s, g) => s + Number(g.score) * Number(g.weight), 0);
  const validW = valid.reduce((s, g) => s + Number(g.weight), 0);
  const pendW = pending.reduce((s, g) => s + Number(g.weight), 0);
  if (pendW === 0) return null;
  return (target * (validW + pendW) - currentSum) / pendW;
}

function meanColor(mean) {
  if (mean === null) return { text: 'text-slate-400', bg: 'bg-slate-100', label: 'Sem notas' };
  if (mean >= 7) return { text: 'text-green-600', bg: 'bg-green-50', label: 'Tranquilo' };
  if (mean >= 5) return { text: 'text-amber-600', bg: 'bg-amber-50', label: 'Atenção' };
  return { text: 'text-red-600', bg: 'bg-red-50', label: 'Crítico' };
}

function fmt(n) { if (n === null || n === undefined) return '—'; return Number(n).toFixed(1).replace('.', ','); }

function dayDiff(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((d - now) / (1000*60*60*24));
}

function urgencyLabel(diff) {
  if (diff === null) return { text: 'Sem prazo', tag: 'bg-slate-100 text-slate-500' };
  if (diff < 0) return { text: `${Math.abs(diff)}d atras.`, tag: 'bg-red-100 text-red-700' };
  if (diff === 0) return { text: 'Hoje', tag: 'bg-red-100 text-red-700' };
  if (diff === 1) return { text: 'Amanhã', tag: 'bg-amber-100 text-amber-700' };
  if (diff <= 7) return { text: `${diff} dias`, tag: 'bg-blue-100 text-blue-700' };
  return { text: `${diff} dias`, tag: 'bg-slate-100 text-slate-600' };
}

function relTime(iso) {
  const d = new Date(iso); const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'agora';
  if (diff < 3600) return `há ${Math.floor(diff/60)} min`;
  if (diff < 86400) return `há ${Math.floor(diff/3600)} h`;
  if (diff < 172800) return 'ontem';
  if (diff < 604800) return `${Math.floor(diff/86400)} dias atrás`;
  return d.toLocaleDateString('pt-BR');
}

function colorForId(id) {
  let h = 0; for (let i = 0; i < id.length; i++) h = (h + id.charCodeAt(i)) % PRAYER_COLORS.length;
  return PRAYER_COLORS[h];
}

function getStats() {
  const today = new Date().toISOString().slice(0, 10);
  const todayCompletions = allHabitCompletions.filter(h => h.completed_date === today);
  const todayKeys = new Set(todayCompletions.map(h => h.habit_key));

  const totalPoints = allHabitCompletions.reduce((s, h) => s + (h.points || 0), 0);

  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  const weekStr = weekAgo.toISOString().slice(0, 10);
  const weekPoints = allHabitCompletions.filter(h => h.completed_date >= weekStr).reduce((s, h) => s + (h.points || 0), 0);

  // streak
  const dates = [...new Set(allHabitCompletions.map(h => h.completed_date))].sort().reverse();
  let streak = 0;
  let cursor = new Date(); cursor.setHours(0,0,0,0);
  for (const d of dates) {
    const cursorStr = cursor.toISOString().slice(0,10);
    if (d === cursorStr) { streak++; cursor.setDate(cursor.getDate() - 1); }
    else if (d < cursorStr) {
      // gap
      if (streak === 0 && d === new Date(cursor.getTime() - 86400000).toISOString().slice(0,10)) {
        // not today, but yesterday
        cursor = new Date(cursor.getTime() - 86400000);
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      } else break;
    }
  }

  const bibleCount = allHabitCompletions.filter(h => h.habit_key === 'bible').length;
  const lateTasks = tasks.filter(t => !t.completed && t.due_date && new Date(t.due_date) < new Date()).length;
  const pendingTasks = tasks.filter(t => !t.completed).length;
  const totalCompletions = allHabitCompletions.length;

  return { todayKeys, totalPoints, weekPoints, streak, bibleCount, lateTasks, pendingTasks, totalCompletions };
}

// ============ TASKS ============
function renderTasks() {
  const pending = tasks.filter(t => !t.completed);
  const done = tasks.filter(t => t.completed);
  const grouped = { atrasada: [], hoje: [], semana: [], depois: [], sempraz: [] };
  pending.forEach(t => {
    const d = dayDiff(t.due_date);
    if (d === null) grouped.sempraz.push(t);
    else if (d < 0) grouped.atrasada.push(t);
    else if (d === 0) grouped.hoje.push(t);
    else if (d <= 7) grouped.semana.push(t);
    else grouped.depois.push(t);
  });

  return `
    <div class="flex items-center justify-between mb-3">
      <div class="text-xl font-bold text-slate-900">Minhas tarefas</div>
      <button onclick="openTaskModal()" class="text-xs font-bold bg-blue-900 text-white px-3 py-1.5 rounded-full">+ Tarefa</button>

    ${tasks.length === 0 ? `

        <div class="text-4xl mb-3">📋</div>
        <div class="text-sm font-semibold text-slate-900 mb-1">Sem tarefas</div>
        <div class="text-xs text-slate-500 mb-4">Adicione provas, trabalhos e lembretes.</div>

      </div>
    ` : `

      ${renderTaskGroup('Hoje', grouped.hoje, 'red')}
      ${renderTaskGroup('Esta semana', grouped.semana, 'blue')}
      ${renderTaskGroup('Mais pra frente', grouped.depois, 'slate')}
      ${renderTaskGroup('Sem prazo', grouped.sempraz, 'slate')}

}

function renderTaskGroup(label, list, color) {

}

function renderTaskCard(t) {

  return `

      ${subjects.length === 0 ? `
        <div class="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center">
          <div class="text-4xl mb-3">📚</div>
          <div class="text-sm font-semibold text-slate-900 mb-1">Sem matérias ainda</div>
          <div class="text-xs text-slate-500 mb-4">Adicione suas matérias do bimestre.</div>
          <button onclick="openSubjectModal()" class="bg-blue-900 text-white text-sm font-semibold px-5 py-2.5 rounded-xl">+ Adicionar primeira matéria</button>
        </div>
      ` : subjects.map(s => renderSubjectCard(s)).join('')}
    </div>
  `;
}

function renderSubjectCard(s) {
  const mean = calcMean(s.grades);
  const color = meanColor(mean);
  const expanded = expandedId === s.id;
  const grades = (s.grades || []).slice().sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  const needed = calcNeeded(s.grades, 7);
  const pendingCount = (s.grades || []).filter(g => g.score === null || g.score === undefined).length;

  return `
    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">
      <div onclick="toggleSubject('${s.id}')" class="p-4 flex items-center gap-3 cursor-pointer">
        <div class="w-11 h-11 rounded-xl ${color.bg} flex items-center justify-center text-xl">${s.emoji || '📚'}</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-bold text-slate-900 truncate">${s.name}</div>
          <div class="text-xs ${color.text} font-semibold">${color.label}${grades.length > 0 ? ' · ' + grades.length + ' avaliação(ões)' : ''}</div>
        </div>
        <div class="text-2xl font-extrabold ${color.text} px-3 py-1 ${color.bg} rounded-lg min-w-[58px] text-center">${fmt(mean)}</div>
        <div class="text-slate-400 ${expanded ? 'rotate-180' : ''} transition">▾</div>
      </div>
      ${expanded ? `
        <div class="border-t border-slate-100 p-4 bg-slate-50">
          ${grades.length === 0 ? '<div class="text-center py-3 text-xs text-slate-500 mb-2">Nenhuma avaliação cadastrada ainda.</div>' : `
            <div class="space-y-2 mb-3">
              ${grades.map(g => `
                <div class="flex items-center gap-3 bg-white rounded-xl p-3">
                  <div class="flex-1 min-w-0">
                    <div class="text-sm font-semibold text-slate-900 truncate">${g.evaluation_name}</div>
                    <div class="text-xs text-slate-400">Peso ${g.weight}${g.evaluation_date ? ' · ' + new Date(g.evaluation_date).toLocaleDateString('pt-BR') : ''}</div>
                  </div>
                  <div class="text-base font-extrabold ${g.score === null || g.score === undefined ? 'text-slate-300 italic text-xs font-medium' : 'text-slate-900'}">${g.score === null || g.score === undefined ? 'a fazer' : fmt(g.score)}</div>
                  <button onclick="event.stopPropagation(); deleteGrade('${g.id}')" class="text-slate-300 hover:text-red-500 text-lg leading-none w-7 h-7">×</button>
                </div>
              `).join('')}
            </div>
          `}
          ${renderMeanTip(mean, needed, pendingCount)}
          <div class="flex gap-2">
            <button onclick="openGradeModal('${s.id}')" class="flex-1 bg-blue-900 text-white text-sm font-semibold py-2.5 rounded-xl">+ Adicionar nota</button>
            <button onclick="deleteSubject('${s.id}', '${s.name.replace(/'/g, '')}')" class="bg-white border border-slate-200 text-slate-500 hover:text-red-600 text-sm font-semibold px-4 rounded-xl">Apagar</button>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderMeanTip(mean, needed, pendingCount) {
  if (mean === null && pendingCount === 0) return `<div class="rounded-xl p-3 mb-3 bg-slate-100 text-slate-600 text-xs font-medium leading-relaxed">📝 Adicione suas avaliações pra começar a acompanhar a média.</div>`;
  if (pendingCount > 0 && needed !== null) {
    if (needed > 10) return `<div class="rounded-xl p-3 mb-3 bg-red-50 text-red-700 text-xs font-medium leading-relaxed">⚠️ Mesmo tirando 10 nas pendentes, não dá pra fechar com média 7. Pensa em recuperação.</div>`;
    if (needed <= 0) return `<div class="rounded-xl p-3 mb-3 bg-green-50 text-green-700 text-xs font-medium leading-relaxed">✅ Mesmo zerando as pendentes, você fecha com média 7. Tá voando.</div>`;
    return `<div class="rounded-xl p-3 mb-3 bg-amber-50 text-amber-800 text-xs font-medium leading-relaxed">🎯 Pra fechar com média 7, você precisa tirar pelo menos <strong>${fmt(needed)}</strong> ${pendingCount > 1 ? 'em média nas pendentes' : 'na próxima'}.</div>`;
  }
  if (mean !== null && mean >= 7) return `<div class="rounded-xl p-3 mb-3 bg-green-50 text-green-700 text-xs font-medium leading-relaxed">✅ Sua média está em <strong>${fmt(mean)}</strong>, acima da meta de 7,0.</div>`;
  if (mean !== null && mean < 7) {
    const gap = 7 - mean;
    return `<div class="rounded-xl p-3 mb-3 bg-amber-50 text-amber-800 text-xs font-medium leading-relaxed">⚠️ Sua média está em <strong>${fmt(mean)}</strong>. Faltam <strong>${fmt(gap)}</strong> ponto(s) pra atingir 7,0. Adicione uma próxima avaliação ou recuperação pra ver quanto precisa tirar.</div>`;
  }
  return '';
}

function toggleSubject(id) { expandedId = expandedId === id ? null : id; renderShell(); }

// ============ POINTS ============
function renderPoints(stats) {
  const nextReward = REWARDS.slice().sort((a, b) => a.cost - b.cost).find(r => r.cost > stats.totalPoints) || REWARDS[REWARDS.length-1];
  const progress = Math.min(100, (stats.totalPoints / nextReward.cost) * 100);
  const remaining = Math.max(0, nextReward.cost - stats.totalPoints);
  const todayDone = HABITS.filter(h => stats.todayKeys.has(h.key)).length;
  const achievements = getAchievements(stats);

  return `
    <div class="flex items-center justify-between mb-3">
      <div class="text-xl font-bold text-slate-900">Meus pontos</div>
    </div>

    <div class="bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl p-6 text-white text-center mb-5 relative overflow-hidden">
      <div class="absolute -top-7 right-0 text-8xl opacity-15">★</div>
      <div class="text-xs uppercase tracking-widest opacity-90 font-semibold mb-1">⭐ Total acumulado</div>
      <div class="text-5xl font-extrabold mb-2">${stats.totalPoints}</div>
      <div class="text-xs opacity-90 font-medium">${remaining > 0 ? `Faltam ${remaining} pts pra "${nextReward.name}"` : `Você desbloqueou todas as recompensas!`}</div>
      <div class="h-1.5 bg-white/30 rounded-full overflow-hidden mt-3"><div class="h-full bg-white rounded-full transition-all" style="width: ${progress}%"></div></div>
    </div>

    <div class="bg-white rounded-2xl p-5 border border-slate-100 mb-5">
      <div class="flex items-center justify-between mb-3">
        <div class="text-sm font-bold text-slate-900">Hábitos de hoje</div>
        <div class="text-xs text-slate-500 font-semibold">${todayDone} de ${HABITS.length}</div>
      </div>
      ${HABITS.map(h => {
        const done = stats.todayKeys.has(h.key);
        return `
          <div onclick="toggleHabit('${h.key}', ${h.points}, ${done})" class="flex items-center gap-3 py-2.5 border-b border-slate-100 last:border-0 cursor-pointer">
            <div class="w-6 h-6 rounded-md border-2 ${done ? 'bg-blue-900 border-blue-900 text-white' : 'border-slate-300'} flex items-center justify-center text-sm flex-shrink-0">${done ? '✓' : ''}</div>
            <div class="flex-1 text-sm font-medium ${done ? 'line-through text-slate-400' : 'text-slate-900'}">${h.text}</div>
            <div class="text-xs font-bold text-amber-700 bg-amber-100 px-2 py-1 rounded-full">+${h.points}</div>
          </div>
        `;
      }).join('')}
    </div>

    <div class="text-base font-bold text-slate-900 mb-3">Conquistas</div>
    <div class="flex gap-2 mb-5 overflow-x-auto scroll-x pb-1">
      ${achievements.map(a => `
        <div class="flex-shrink-0 w-20 bg-white rounded-xl p-3 text-center border border-slate-100">
          <div class="w-12 h-12 mx-auto mb-1.5 rounded-full flex items-center justify-center text-2xl ${a.unlocked ? 'bg-gradient-to-br from-amber-300 to-orange-500' : 'bg-slate-100 opacity-60'}">${a.unlocked ? a.icon : '🔒'}</div>
          <div class="text-[10px] font-bold text-slate-900 leading-tight">${a.name}</div>
        </div>
      `).join('')}
    </div>

    <div class="text-base font-bold text-slate-900 mb-3">Trocar pontos</div>
    <div class="space-y-2">
      ${REWARDS.map(r => `
        <div class="bg-white rounded-xl p-3 flex items-center gap-3 border border-slate-100">
          <div class="w-11 h-11 rounded-xl bg-slate-100 flex items-center justify-center text-xl">${r.icon}</div>
          <div class="flex-1">
            <div class="text-sm font-semibold text-slate-900">${r.name}</div>
            <div class="text-xs text-amber-700 font-bold">${r.cost} pts</div>
          </div>
          <button ${stats.totalPoints < r.cost ? 'disabled' : ''} onclick="claimReward('${r.name}', ${r.cost})" class="text-xs font-bold ${stats.totalPoints < r.cost ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-blue-900 text-white'} px-3 py-2 rounded-full">${stats.totalPoints < r.cost ? `Faltam ${r.cost - stats.totalPoints}` : 'Trocar'}</button>
        </div>
      `).join('')}
    </div>
  `;
}

async function toggleHabit(key, points, done) {
  const today = new Date().toISOString().slice(0, 10);
  if (done) {
    const { error } = await sb.from('habit_completions').delete().eq('habit_key', key).eq('completed_date', today);
    if (error) { alert('Erro: ' + error.message); return; }
  } else {
    const { error } = await sb.from('habit_completions').insert({ habit_key: key, completed_date: today, points });
    if (error) { alert('Erro: ' + error.message); return; }
  }
  await loadAndRender();
}

function claimReward(name, cost) {
  alert(`"${name}" trocada! (Implementação completa em breve)`);
}
