// ============ HELPERS ============
function calcMean(grades) {
  const valid = (grades || []).filter(g => g.score !== null && g.score !== undefined);
  if (valid.length === 0) return null;
  const total = valid.reduce((s, g) => s + Number(g.score) * Number(g.weight), 0);
  const w = valid.reduce((s, g) => s + Number(g.weight), 0);
  return w > 0 ? total / w : null;
}

function calcNeeded(grades, target = 7) {
  const valid = (grades || []).filter(g => g.score !== null && g.score !== undefined);
  const pending = (grades || []).filter(g => g.score === null || g.score === undefined);
  if (pending.length === 0) return null;
  const currentSum = valid.reduce((s, g) => s + Number(g.score) * Number(g.weight), 0);
  const validW = valid.reduce((s, g) => s + Number(g.weight), 0);
  const pendW = pending.reduce((s, g) => s + Number(g.weight), 0);
  if (pendW === 0) return null;
  return (target * (validW + pendW) - currentSum) / pendW;
}

function meanColor(mean) {
  if (mean === null) return { text: 'text-slate-400', bg: 'bg-slate-100', label: 'Sem notas' };
  if (mean >= 7) return { text: 'text-green-600', bg: 'bg-green-50', label: 'Tranquilo' };
  if (mean >= 5) return { text: 'text-amber-600', bg: 'bg-amber-50', label: 'Atenção' };
  return { text: 'text-red-600', bg: 'bg-red-50', label: 'Crítico' };
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toFixed(1).replace('.', ',');
}

function dayDiff(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const now = new Date(); now.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d - now) / (1000*60*60*24));
}

function urgencyLabel(diff) {
  if (diff === null) return { text: 'Sem prazo', tag: 'bg-slate-100 text-slate-500' };
  if (diff < 0) return { text: `${Math.abs(diff)}d atrasada`, tag: 'bg-red-100 text-red-700' };
  if (diff === 0) return { text: 'Hoje', tag: 'bg-red-100 text-red-700' };
  if (diff === 1) return { text: 'Amanhã', tag: 'bg-amber-100 text-amber-700' };
  if (diff <= 7) return { text: `${diff} dias`, tag: 'bg-blue-100 text-blue-700' };
  return { text: `${diff} dias`, tag: 'bg-slate-100 text-slate-600' };
}

  return `

    </div>

    <div class="flex items-center justify-between mb-3">
      <div class="text-base font-bold text-slate-900">Próximas tarefas</div>
      <button onclick="setTab('tasks')" class="text-xs font-semibold text-blue-700">Ver todas →</button>
    </div>

    <div class="space-y-2">
      ${upcomingTasks.length === 0 ? `

          Nenhuma tarefa pendente. Tudo em dia!
        </div>
      ` : upcomingTasks.map(t => renderTaskMini(t)).join('')}

function renderTaskMini(t) {

  const urg = urgencyLabel(diff);

        <div class="text-xs text-slate-400">${subject?.name || 'Geral'}</div>
      </div>
      <span class="text-[10px] font-bold uppercase px-2 py-1 rounded-full ${urg.tag}">${urg.text}</span>

}

// ============ GRADES ============
function renderGrades() {
  return `
    <div class="flex items-center justify-between mb-3">
      <div class="text-xl font-bold text-slate-900">Minhas notas</div>
      <button onclick="openSubjectModal()" class="text-xs font-bold bg-blue-900 text-white px-3 py-1.5 rounded-full">+ Matéria</button>
    </div>
    <div class="space-y-2">
      ${subjects.length === 0 ? `
        <div class="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center">
          <div class="text-4xl mb-3">📚</div>
          <div class="text-sm font-semibold text-slate-900 mb-1">Sem matérias ainda</div>
          <div class="text-xs text-slate-500 mb-4">Adicione suas matérias do bimestre.</div>
          <button onclick="openSubjectModal()" class="bg-blue-900 text-white text-sm font-semibold px-5 py-2.5 rounded-xl">+ Adicionar primeira matéria</button>
        </div>
      ` : subjects.map(s => renderSubjectCard(s)).join('')}
    </div>
  `;
}

function renderSubjectCard(s) {
  const mean = calcMean(s.grades);
  const color = meanColor(mean);
  const expanded = expandedId === s.id;
  const grades = (s.grades || []).slice().sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  const needed = calcNeeded(s.grades, 7);
  const pendingCount = (s.grades || []).filter(g => g.score === null || g.score === undefined).length;

  return `
    <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">
      <div onclick="toggleSubject('${s.id}')" class="p-4 flex items-center gap-3 cursor-pointer">
        <div class="w-11 h-11 rounded-xl ${color.bg} flex items-center justify-center text-xl flex-shrink-0">${s.emoji || '📚'}</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-bold text-slate-900 truncate">${s.name}</div>
          <div class="text-xs ${color.text} font-semibold">${color.label}${grades.length > 0 ? ' · ' + grades.length + ' avaliação(ões)' : ''}</div>
        </div>
        <div class="text-2xl font-extrabold ${color.text} px-3 py-1 ${color.bg} rounded-lg min-w-[58px] text-center">${fmt(mean)}</div>
        <div class="text-slate-400 transition ${expanded ? 'rotate-180' : ''}">▾</div>
      </div>

      ${expanded ? `
        <div class="border-t border-slate-100 p-4 bg-slate-50">
          ${grades.length === 0 ? '<div class="text-center py-3 text-xs text-slate-500 mb-2">Nenhuma avaliação cadastrada ainda.</div>' : `
            <div class="space-y-2 mb-3">
              ${grades.map(g => `
                <div class="flex items-center gap-3 bg-white rounded-xl p-3">
                  <div class="flex-1 min-w-0">
                    <div class="text-sm font-semibold text-slate-900 truncate">${g.evaluation_name}</div>
                    <div class="text-xs text-slate-400">Peso ${g.weight}${g.evaluation_date ? ' · ' + new Date(g.evaluation_date).toLocaleDateString('pt-BR') : ''}</div>
                  </div>
                  <div class="text-base font-extrabold ${g.score === null || g.score === undefined ? 'text-slate-300 italic text-xs font-medium' : 'text-slate-900'}">${g.score === null || g.score === undefined ? 'a fazer' : fmt(g.score)}</div>
                  <button onclick="event.stopPropagation(); deleteGrade('${g.id}')" class="text-slate-300 hover:text-red-500 text-lg leading-none w-7 h-7">×</button>
                </div>
              `).join('')}
            </div>
          `}

          ${renderMeanTip(mean, needed, pendingCount)}

          <div class="flex gap-2">
            <button onclick="openGradeModal('${s.id}')" class="flex-1 bg-blue-900 text-white text-sm font-semibold py-2.5 rounded-xl">+ Adicionar nota</button>
            <button onclick="deleteSubject('${s.id}', '${s.name.replace(/'/g, '')}')" class="bg-white border border-slate-200 text-slate-500 hover:text-red-600 text-sm font-semibold px-4 rounded-xl">Apagar</button>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderMeanTip(mean, needed, pendingCount) {
  if (mean === null && pendingCount === 0) {
    return `<div class="rounded-xl p-3 mb-3 bg-slate-100 text-slate-600 text-xs font-medium leading-relaxed">📝 Adicione suas avaliações pra começar a acompanhar a média.</div>`;
  }

  if (pendingCount > 0 && needed !== null) {
    if (needed > 10) {
      return `<div class="rounded-xl p-3 mb-3 bg-red-50 text-red-700 text-xs font-medium leading-relaxed">⚠️ Mesmo tirando 10 nas avaliações pendentes, não dá pra fechar com média 7. Pensa em recuperação.</div>`;
    }
    if (needed <= 0) {
      return `<div class="rounded-xl p-3 mb-3 bg-green-50 text-green-700 text-xs font-medium leading-relaxed">✅ Mesmo zerando as pendentes, você fecha com média 7. Tá voando.</div>`;
    }
    return `<div class="rounded-xl p-3 mb-3 bg-amber-50 text-amber-800 text-xs font-medium leading-relaxed">🎯 Pra fechar com média 7, você precisa tirar pelo menos <strong>${fmt(needed)}</strong> ${pendingCount > 1 ? 'em média nas pendentes' : 'na próxima'}.</div>`;
  }

  // sem pendentes
  if (mean !== null && mean >= 7) {
    return `<div class="rounded-xl p-3 mb-3 bg-green-50 text-green-700 text-xs font-medium leading-relaxed">✅ Sua média está em <strong>${fmt(mean)}</strong>, acima da meta de 7,0.</div>`;
  }
  if (mean !== null && mean < 7) {
    const gap = 7 - mean;
    return `<div class="rounded-xl p-3 mb-3 bg-amber-50 text-amber-800 text-xs font-medium leading-relaxed">⚠️ Sua média está em <strong>${fmt(mean)}</strong>. Faltam <strong>${fmt(gap)}</strong> ponto(s) pra atingir 7,0. Adicione uma próxima avaliação ou recuperação pra ver quanto precisa tirar.</div>`;
  }
  return '';
}

function toggleSubject(id) { expandedId = expandedId === id ? null : id; renderShell(); }

// ============ TASKS ============
function renderTasks() {
  const pending = tasks.filter(t => !t.completed);
  const done = tasks.filter(t => t.completed);
  const grouped = { atrasada: [], hoje: [], semana: [], depois: [], sempraz: [] };
  pending.forEach(t => {
    const d = dayDiff(t.due_date);
    if (d === null) grouped.sempraz.push(t);
    else if (d < 0) grouped.atrasada.push(t);
    else if (d === 0) grouped.hoje.push(t);
    else if (d <= 7) grouped.semana.push(t);
    else grouped.depois.push(t);
  });

  return `
    <div class="flex items-center justify-between mb-3">
      <div class="text-xl font-bold text-slate-900">Minhas tarefas</div>
      <button onclick="openTaskModal()" class="text-xs font-bold bg-blue-900 text-white px-3 py-1.5 rounded-full">+ Tarefa</button>
    </div>

    ${tasks.length === 0 ? `
      <div class="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center">
        <div class="text-4xl mb-3">📋</div>
        <div class="text-sm font-semibold text-slate-900 mb-1">Sem tarefas</div>
        <div class="text-xs text-slate-500 mb-4">Adicione provas, trabalhos e lembretes.</div>
        <button onclick="openTaskModal()" class="bg-blue-900 text-white text-sm font-semibold px-5 py-2.5 rounded-xl">+ Adicionar primeira tarefa</button>
      </div>
    ` : `
      ${renderTaskGroup('Atrasadas', grouped.atrasada, 'red')}
      ${renderTaskGroup('Hoje', grouped.hoje, 'red')}
      ${renderTaskGroup('Esta semana', grouped.semana, 'blue')}
      ${renderTaskGroup('Mais pra frente', grouped.depois, 'slate')}
      ${renderTaskGroup('Sem prazo', grouped.sempraz, 'slate')}
      ${done.length > 0 ? `
        <div class="text-xs uppercase tracking-wide text-slate-400 font-bold mt-6 mb-2 px-1">Concluídas (${done.length})</div>
        <div class="space-y-2">${done.map(t => renderTaskCard(t)).join('')}</div>
      ` : ''}
    `}
  `;
}

function renderTaskGroup(label, list, color) {
  if (list.length === 0) return '';
  return `
    <div class="text-xs uppercase tracking-wide font-bold mt-4 mb-2 px-1 text-${color}-600">${label} (${list.length})</div>
    <div class="space-y-2">${list.map(t => renderTaskCard(t)).join('')}</div>
  `;
}

function renderTaskCard(t) {
  const subject = subjects.find(s => s.id === t.subject_id);
  const diff = dayDiff(t.due_date);
  const urg = urgencyLabel(diff);
  return `
    <div class="bg-white rounded-xl p-3 flex items-center gap-3 border border-slate-100 ${t.completed ? 'opacity-60' : ''}">
      <button onclick="toggleTaskComplete('${t.id}', ${t.completed})" class="w-6 h-6 rounded-md border-2 ${t.completed ? 'bg-blue-900 border-blue-900 text-white' : 'border-slate-300'} flex-shrink-0 flex items-center justify-center text-sm">${t.completed ? '✓' : ''}</button>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-semibold text-slate-900 truncate ${t.completed ? 'line-through' : ''}">${t.title}</div>
        <div class="text-xs text-slate-400">${subject ? subject.emoji + ' ' + subject.name : 'Geral'}${t.due_date ? ' · ' + new Date(t.due_date).toLocaleDateString('pt-BR') : ''}</div>
      </div>
      ${!t.completed ? `<span class="text-[10px] font-bold uppercase px-2 py-1 rounded-full ${urg.tag} whitespace-nowrap">${urg.text}</span>` : ''}
      <button onclick="deleteTask('${t.id}')" class="text-slate-300 hover:text-red-500 text-lg leading-none w-7 h-7">×</button>
    </div>
  `;
}

            </div>
            <input type="hidden" id="subjectEmoji" value="${EMOJIS[0]}">
          </div>
          <div class="flex gap-2 pt-2">
            <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-700 font-semibold py-2.5 rounded-xl text-sm">Cancelar</button>
            <button type="submit" class="flex-1 bg-blue-900 text-white font-semibold py-2.5 rounded-xl text-sm">Adicionar</button>
          </div>
        </form>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById('subjectName')?.focus(), 100);
}

function pickEmoji(e) {
  document.getElementById('subjectEmoji').value = e;
  document.querySelectorAll('#emojiPicker button').forEach(b => {
    if (b.dataset.emoji === e) b.className = 'aspect-square text-2xl rounded-xl border border-blue-700 bg-blue-50';
    else b.className = 'aspect-square text-2xl rounded-xl border border-slate-200';
  });
}

async function handleAddSubject(e) {
  e.preventDefault();
  const name = document.getElementById('subjectName').value.trim();
  const emoji = document.getElementById('subjectEmoji').value;
  const { error } = await sb.from('subjects').insert({ name, emoji });
  if (error) { alert('Erro: ' + error.message); return; }
  closeModal();
  await loadAndRender();
}

function openGradeModal(subjectId) {
  modalEl.classList.remove('hidden');
  modalEl.innerHTML = `
    <div class="fixed inset-0 modal-bg flex items-end sm:items-center justify-center z-50" onclick="if(event.target===this)closeModal()">
      <div class="bg-white w-full max-w-md sm:rounded-2xl rounded-t-2xl p-6 shadow-2xl">
        <div class="text-base font-bold text-slate-900 mb-4">Nova avaliação</div>
        <form onsubmit="handleAddGrade(event, '${subjectId}')" class="space-y-4">
          <div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Nome</label><input type="text" id="gradeName" required maxlength="40" placeholder="Ex: Prova 1, Trabalho..." class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700"></div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Peso</label><input type="number" id="gradeWeight" required min="1" max="10" step="1" value="1" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700"></div>
            <div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Nota (opcional)</label><input type="number" id="gradeScore" min="0" max="10" step="0.1" placeholder="Ex: 8,5" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700"></div>
          </div>
          <div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Data (opcional)</label><input type="date" id="gradeDate" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700"></div>
          <div class="text-xs text-slate-400">Deixa a nota em branco se ainda não fez. Adicione depois.</div>
          <div class="flex gap-2 pt-2">
            <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-700 font-semibold py-2.5 rounded-xl text-sm">Cancelar</button>
            <button type="submit" class="flex-1 bg-blue-900 text-white font-semibold py-2.5 rounded-xl text-sm">Adicionar</button>
          </div>
        </form>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById('gradeName')?.focus(), 100);
}

async function handleAddGrade(e, subjectId) {
  e.preventDefault();
  const evaluation_name = document.getElementById('gradeName').value.trim();
  const weight = Number(document.getElementById('gradeWeight').value);
  const scoreVal = document.getElementById('gradeScore').value;
  const score = scoreVal === '' ? null : Number(scoreVal);
  const dateVal = document.getElementById('gradeDate').value;
  const evaluation_date = dateVal === '' ? null : dateVal;
  const { error } = await sb.from('grades').insert({ subject_id: subjectId, evaluation_name, weight, score, evaluation_date });
  if (error) { alert('Erro: ' + error.message); return; }
  closeModal();
  await loadAndRender();
}

function openTaskModal() {
  modalEl.classList.remove('hidden');
  const subjOpts = subjects.map(s => `<option value="${s.id}">${s.emoji} ${s.name}</option>`).join('');
  modalEl.innerHTML = `
    <div class="fixed inset-0 modal-bg flex items-end sm:items-center justify-center z-50" onclick="if(event.target===this)closeModal()">
      <div class="bg-white w-full max-w-md sm:rounded-2xl rounded-t-2xl p-6 shadow-2xl">
        <div class="text-base font-bold text-slate-900 mb-4">Nova tarefa</div>
        <form onsubmit="handleAddTask(event)" class="space-y-4">
          <div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Título</label><input type="text" id="taskTitle" required maxlength="80" placeholder="Ex: Estudar pra prova de matemática" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700"></div>
          <div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Matéria (opcional)</label><select id="taskSubject" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700 bg-white"><option value="">Geral</option>${subjOpts}</select></div>
          <div><label class="block text-xs font-semibold text-slate-700 mb-1.5">Data de entrega (opcional)</label><input type="date" id="taskDate" class="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-700"></div>
          <div class="flex gap-2 pt-2">
            <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-700 font-semibold py-2.5 rounded-xl text-sm">Cancelar</button>
            <button type="submit" class="flex-1 bg-blue-900 text-white font-semibold py-2.5 rounded-xl text-sm">Adicionar</button>
          </div>
        </form>
      </div>
    </div>
  `;
  setTimeout(() => document.getElementById('taskTitle')?.focus(), 100);
}

async function handleAddTask(e) {
  e.preventDefault();
  const title = document.getElementById('taskTitle').value.trim();
  const subjVal = document.getElementById('taskSubject').value;
  const subject_id = subjVal === '' ? null : subjVal;
  const dateVal = document.getElementById('taskDate').value;
  const due_date = dateVal === '' ? null : dateVal;
  const { error } = await sb.from('tasks').insert({ title, subject_id, due_date });
  if (error) { alert('Erro: ' + error.message); return; }
  closeModal();
  await loadAndRender();
}

async function toggleTaskComplete(id, current) {
  const { error } = await sb.from('tasks').update({ completed: !current, completed_at: !current ? new Date().toISOString() : null }).eq('id', id);
  if (error) { alert('Erro: ' + error.message); return; }
  await loadAndRender();
}

async function deleteTask(id) {
  if (!confirm('Apagar essa tarefa?')) return;
  const { error } = await sb.from('tasks').delete().eq('id', id);
  if (error) { alert('Erro: ' + error.message); return; }
  await loadAndRender();
}

async function deleteSubject(id, name) {
  if (!confirm(`Apagar "${name}" e todas as notas dessa matéria?`)) return;
  const { error } = await sb.from('subjects').delete().eq('id', id);
  if (error) { alert('Erro: ' + error.message); return; }
  if (expandedId === id) expandedId = null;
  await loadAndRender();
}

async function deleteGrade(id) {
  if (!confirm('Apagar essa avaliação?')) return;
  const { error } = await sb.from('grades').delete().eq('id', id);
  if (error) { alert('Erro: ' + error.message); return; }
  await loadAndRender();
}

function closeModal() { modalEl.classList.add('hidden'); modalEl.innerHTML = ''; }

// ============ AUTH ============
function setMode(newMode) { mode = newMode; renderAuth(); }

function showMessage(text, type) {
  const msg = document.getElementById('message');
  msg.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700', 'bg-slate-50', 'text-slate-600');
  if (type === 'error') msg.classList.add('bg-red-50', 'text-red-700');
  else if (type === 'success') msg.classList.add('bg-green-50', 'text-green-700');
  else msg.classList.add('bg-slate-50', 'text-slate-600');
  msg.textContent = text;
}

function translateError(message) {
  const map = {
    'Invalid login credentials': 'Email ou senha incorretos.',
    'User already registered': 'Esse email já tem conta. Tenta entrar.',
    'Email not confirmed': 'Você precisa confirmar seu email antes de entrar.',
    'Password should be at least 6 characters': 'A senha precisa ter no mínimo 6 caracteres.',
  };
  return map[message] || message;
}

async function handleAuth(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.classList.add('opacity-60');
  showMessage('Aguarde...', 'info');
  if (mode === 'signup') {
    const { error } = await sb.auth.signUp({ email, password });
    if (error) showMessage(translateError(error.message), 'error');
    else showMessage('Conta criada. Agora clica em Entrar.', 'success');
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) showMessage(translateError(error.message), 'error');
    else { currentUser = data.user; await loadAndRender(); return; }
  }
  btn.disabled = false; btn.classList.remove('opacity-60');
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null; subjects = []; tasks = []; expandedId = null; currentTab = 'home';
  renderAuth();
}

checkAuth();
</script>
